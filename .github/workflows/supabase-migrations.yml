name: Apply Supabase migrations

# Applies pending supabase/migrations/** to the linked Supabase project.
# Runs on merge to main (when migrations change) and can be triggered manually.
#
# Required GitHub repo config (Settings -> Secrets and variables -> Actions):
#   Secrets:
#     SUPABASE_ACCESS_TOKEN  - personal access token (https://supabase.com/dashboard/account/tokens)
#     SUPABASE_DB_PASSWORD   - the project's database password (Project Settings -> Database)
#   The project ref below is NOT secret (it's in the project URL); change it to
#   target a different project.

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
  workflow_dispatch: {}

concurrency:
  group: supabase-migrations
  cancel-in-progress: false

jobs:
  db-push:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      # mll project ref (not secret).
      SUPABASE_PROJECT_REF: mllkugitfwasiwgbortk
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Push pending migrations
        run: supabase db push
